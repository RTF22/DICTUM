name: Feature request
description: Suggest an idea or improvement for VOCIX
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Before filing a feature request, consider opening a Discussion first if the idea is early-stage — it keeps the issue tracker focused on actionable work.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do? What doesn't work well today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I searched existing issues and discussions for a similar idea.
          required: true
